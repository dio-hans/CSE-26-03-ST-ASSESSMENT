{% extends 'base.html' %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 mt-8">

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">

        {% for video in videos %}
        <div class="cursor-pointer group">
            
            <div class="w-full aspect-video bg-blue-800 rounded-lg mb-3 group-hover:opacity-90 transition"></div>
            
            <div class="flex justify-between items-start">
                <h3 class="text-sm font-bold text-gray-900 leading-tight line-clamp-2">
                    {{ video.title }}
                </h3>
                
                <button class="text-gray-500 hover:text-gray-800 ml-2">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
                </button>
            </div>
            
            <p class="text-xs text-gray-500 mt-1">
                {{ video.views_count }} views &bull; {{ video.created_at|timesince }} ago
            </p>
            
        </div>
        {% endfor %}

    </div>
</div>
{% endblock %}
